name: CI

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:
    branches:
      - main

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - run: cargo fmt --check

      - run: cargo clippy --all-targets -- -D warnings

      - run: cargo test

      - run: cargo run -p reposcryer-cli -- index examples/sample-rust-project

      - run: cargo run -p reposcryer-cli -- status examples/sample-rust-project

      - run: cargo run -p reposcryer-cli -- changed examples/sample-rust-project

      - run: cargo run -p reposcryer-cli -- explain examples/sample-rust-project src/main.rs

      - run: cargo run -p reposcryer-cli -- graph neighbors examples/sample-rust-project src/main.rs

      - run: cargo run -p reposcryer-cli -- impact examples/sample-rust-project src/auth.rs

      - run: cargo run -p reposcryer-cli -- graph rebuild examples/sample-rust-project

      - name: Assert no fake call graph edges
        run: |
          if grep -R -E '"?(Calls|CALLS|calls)"?' examples/sample-rust-project/.reposcryer/exports/graph.json; then
            echo "Unexpected call graph edge output"
            exit 1
          fi
